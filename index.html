<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GAS-FOOD Partner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #EE4D2D; --bg: #2b2d42; --card: #3d405b; --input: #edf2f4; --text-dark: #2b2d42; --success: #2ecc71; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; color: white; margin: 0; overflow-x: hidden; }
        .app-container { max-width: 480px; margin: auto; min-height: 100vh; background: var(--bg); padding-bottom: 40px; }
        .welcome-section { padding: 60px 20px; text-align: center; background: linear-gradient(180deg, var(--primary) 0%, var(--bg) 100%); border-radius: 0 0 50px 50px; }
        .motor-icon-anim { font-size: 80px; color: white; margin-bottom: 20px; animation: moveMotor 3s infinite ease-in-out; }
        @keyframes moveMotor { 0%, 100% { transform: translateX(-10px) rotate(-2deg); } 50% { transform: translateX(10px) rotate(2deg); } }
        
        .driver-card { background: var(--card); border-radius: 30px; padding: 25px; margin: -30px 20px 25px 20px; box-shadow: 0 15px 30px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); position: relative; }
        .status-badge { position: absolute; top: 15px; right: 20px; background: var(--success); color: white; font-size: 10px; padding: 4px 12px; border-radius: 20px; font-weight: 800; display: none; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        .slider-wrapper { background: rgba(255,255,255,0.1); border-radius: 50px; height: 65px; position: relative; display: flex; align-items: center; justify-content: center; border: 2px solid rgba(255,255,255,0.2); margin: 20px; overflow: hidden; }
        .slider-text { font-size: 12px; font-weight: 800; color: #adb5bd; z-index: 1; letter-spacing: 1px; pointer-events: none; }
        .slider-handle { position: absolute; left: 5px; height: 55px; width: 55px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; z-index: 2; cursor: pointer; }
        
        .form-control-pro { background: var(--input); border: none; color: var(--text-dark); padding: 18px; border-radius: 18px; width: 100%; font-weight: 600; margin-bottom: 15px; }
        .input-group-pro { position: relative; }
        .toggle-password { position: absolute; right: 18px; top: 20px; color: #6c757d; cursor: pointer; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 20px; width: 100%; font-weight: 800; }
        .menu-item { background: rgba(255,255,255,0.05); padding: 18px; border-radius: 22px; display: flex; align-items: center; margin: 0 20px 12px 20px; border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="ui-header" class="welcome-section">
        <div class="motor-icon-anim"><i class="fa-solid fa-motorcycle"></i></div>
        <h2 class="fw-bold m-0 text-white">GAS-FOOD</h2>
        <p class="small opacity-75 text-white">Partner Delivery System</p>
    </div>

    <div class="p-3">
        <div id="page-awal" class="text-center mt-2">
            <h4 class="fw-bold mb-3">Siap Antar Pesanan?</h4>
            <button onclick="showPage('LOGIN')" class="btn-main mb-3 shadow">MULAI MASUK</button>
            <button onclick="showPage('DAFTAR')" class="btn btn-outline-light w-100 py-3 fw-bold border-2" style="border-radius:20px;">JADI MITRA BARU</button>
        </div>

        <div id="page-form" class="hidden mt-2">
            <h5 id="form-title" class="fw-bold mb-4 text-center"></h5>
            <div id="form-content">
                <input type="number" id="wa" class="form-control-pro" placeholder="Nomor WhatsApp">
                
                <div id="kolom-login-saja">
                    <div class="input-group-pro">
                        <input type="password" id="pass" class="form-control-pro" placeholder="Password Akun">
                        <i class="fa-solid fa-eye toggle-password" id="eye-icon" onclick="togglePass()"></i>
                    </div>
                    <div class="text-end mb-3" style="margin-top: -10px;">
                        <span onclick="resetPassword()" style="cursor:pointer;" class="text-white-50 small">Lupa Password?</span>
                    </div>
                </div>

                <div id="kolom-daftar" class="hidden">
                    <input type="text" id="nama" class="form-control-pro" placeholder="Nama Lengkap">
                    <input type="text" id="motor" class="form-control-pro" placeholder="Motor & Plat Nomor">
                    <input type="text" id="alamat" class="form-control-pro" placeholder="Alamat Domisili">
                    <input type="password" id="pass_daftar" class="form-control-pro" placeholder="Buat Password Baru">
                </div>

                <button onclick="gasKirim()" id="btn-submit" class="btn-main mt-3 shadow">KONFIRMASI</button>
                <button onclick="location.reload()" class="btn btn-link w-100 mt-2 text-white-50 text-decoration-none small">Kembali</button>
            </div>
        </div>

        <div id="page-dash" class="hidden">
            <div class="driver-card">
                <div id="badge-aktif" class="status-badge"><i class="fa-solid fa-circle me-1"></i> AKTIF</div>
                <div class="d-flex align-items-center mb-4">
                    <img src="" id="user-img" class="rounded-circle border border-3 border-primary me-3 shadow" style="width: 70px; height: 70px;">
                    <div><h5 class="fw-bold m-0" id="user-display">Driver</h5><span class="text-white-50 small" id="wa-display">08xxx</span></div>
                </div>
                <div class="row text-center g-3">
                    <div class="col-6"><div class="p-2 rounded-4 bg-dark"><small class="text-white-50 d-block">RATING</small><span class="fw-bold text-warning"><i class="fa-solid fa-star"></i> <span id="rating-display">0.0</span></span></div></div>
                    <div class="col-6"><div class="p-2 rounded-4 bg-dark"><small class="text-white-50 d-block">UNIT</small><span class="fw-bold small" id="motor-display">-</span></div></div>
                </div>
            </div>
            <div class="slider-wrapper" id="slider-gps">
                <div class="slider-text" id="slider-label">GESER UNTUK UPDATE GPS</div>
                <div class="slider-handle" id="handle"><i class="fa-solid fa-angles-right"></i></div>
            </div>
            <div class="menu-item">
                <div class="menu-icon bg-primary text-white p-2 rounded-3 me-3 text-center" style="width:40px"><i class="fa-solid fa-clock-rotate-left"></i></div>
                <div class="flex-grow-1"><h6 class="m-0 fw-bold">Riwayat Pengantaran</h6><small class="text-white-50">Cek pesanan selesai</small></div>
            </div>
            <div class="text-center mt-5"><button onclick="location.reload()" class="btn btn-sm btn-outline-danger px-4 rounded-pill border-0">Logout</button></div>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzx0XtCh0IIGoauJPXotReAboYYYKnvympmzJTTIH47gRWnZHqplYrobnDYczdxLI2iOg/exec"; 
    const NOMOR_ADMIN = "6289623373483"; 
    let currentMode = "";

    function showPage(mode) {
        currentMode = mode;
        document.getElementById('page-awal').classList.add('hidden');
        document.getElementById('page-form').classList.remove('hidden');
        document.getElementById('form-title').innerText = mode === 'LOGIN' ? 'Masuk Mitra' : 'Daftar Mitra';
        
        const loginSection = document.getElementById('kolom-login-saja');
        const daftarSection = document.getElementById('kolom-daftar');
        
        if(mode === 'LOGIN') {
            loginSection.style.display = 'block';
            daftarSection.style.display = 'none';
        } else {
            loginSection.style.display = 'none';
            daftarSection.style.display = 'block';
        }
    }

    function togglePass() {
        const p = document.getElementById('pass');
        const e = document.getElementById('eye-icon');
        p.type = p.type === "password" ? "text" : "password";
        e.classList.toggle('fa-eye'); e.classList.toggle('fa-eye-slash');
    }

    function resetPassword() {
        const nomorWA = document.getElementById('wa').value;
        if (!nomorWA || nomorWA.length < 5) {
            alert("Ketik nomor WhatsApp kamu dulu di kolom input!");
            document.getElementById('wa').focus();
            return;
        }
        const teksPesan = window.encodeURIComponent(`*RESET PASSWORD*\nHalo Admin, saya lupa password akun GAS-FOOD.\n\nNomor WA: ${nomorWA}`);
        window.location.href = `https://api.whatsapp.com/send?phone=${NOMOR_ADMIN}&text=${teksPesan}`;
    }

    const handle = document.getElementById('handle');
    const slider = document.getElementById('slider-gps');
    const label = document.getElementById('slider-label');
    let isDragging = false;

    const onStart = () => { isDragging = true; };
    const onMove = (e) => {
        if (!isDragging) return;
        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let x = clientX - slider.getBoundingClientRect().left - 25;
        let maxX = slider.clientWidth - 60;
        if (x < 5) x = 5; if (x > maxX) x = maxX;
        handle.style.left = x + "px";
        if (x >= maxX - 2) { isDragging = false; updateGps(); }
    };
    const onEnd = () => { if (isDragging) { isDragging = false; handle.style.left = '5px'; } };

    handle.addEventListener('mousedown', onStart);
    handle.addEventListener('touchstart', onStart);
    document.addEventListener('mousemove', onMove);
    document.addEventListener('touchmove', onMove);
    document.addEventListener('mouseup', onEnd);
    document.addEventListener('touchend', onEnd);

    function gasKirim() {
        const wa = document.getElementById('wa').value;
        const btn = document.getElementById('btn-submit');
        
        // Cek input password berdasarkan mode
        let ps = "";
        if (currentMode === 'LOGIN') {
            ps = document.getElementById('pass').value;
        } else {
            ps = document.getElementById('pass_daftar').value;
        }

        if(!wa) return alert("Nomor WA wajib diisi!");
        if(!ps) return alert("Password wajib diisi!");
        
        btn.disabled = true; btn.innerText = "PROSES...";

        const payload = { 
            type: currentMode, wa: wa, pass: ps, 
            nama: document.getElementById('nama').value || "", 
            motor: document.getElementById('motor').value || "", 
            alamat: document.getElementById('alamat').value || "" 
        };

        fetch(API_URL, { method: "POST", body: JSON.stringify(payload) })
        .then(r => r.text()).then(res => {
            if(res.includes("Sukses")) {
                if(currentMode === 'DAFTAR') tampilHalamanVerifikasi(payload);
                else tampilDashboard(res, payload);
            } else { alert(res); btn.disabled = false; btn.innerText = "KONFIRMASI"; }
        }).catch(() => { alert("Koneksi gagal!"); btn.disabled = false; btn.innerText = "KONFIRMASI"; });
    }

    function tampilHalamanVerifikasi(data) {
        document.getElementById('form-title').innerText = "Verifikasi Akun";
        const teksLengkap = `*KONFIRMASI PENDAFTARAN MITRA BARU*\n\n` +
                          `👤 *Nama:* ${data.nama}\n` +
                          `📱 *WA:* ${data.wa}\n` +
                          `🛵 *Unit/Plat:* ${data.motor}\n` +
                          `🏠 *Alamat:* ${data.alamat}\n\n` +
                          `_Mohon segera diaktifkan akun saya. Terima kasih!_`;

        document.getElementById('form-content').innerHTML = `
            <div class="text-center p-2"><i class="fa-solid fa-user-clock fa-4x text-warning mb-4"></i>
            <h5 class="fw-bold">Data Terkirim!</h5>
            <p class="text-white-50 small mb-4">Silakan klik tombol di bawah untuk kirim data ke Admin agar akun segera diaktifkan.</p>
            <a href="https://api.whatsapp.com/send?phone=${NOMOR_ADMIN}&text=${window.encodeURIComponent(teksLengkap)}" class="btn btn-success w-100 py-3 fw-bold rounded-pill mb-3">
               <i class="fa-brands fa-whatsapp me-2"></i> KIRIM DATA KE WA ADMIN
            </a>
            <button onclick="location.reload()" class="btn btn-outline-light btn-sm rounded-pill px-4">Kembali</button></div>`;
    }

    function tampilDashboard(response, data) {
        const info = response.split("|");
        document.getElementById('user-display').innerText = info[1] || "Driver";
        document.getElementById('wa-display').innerText = data.wa;
        document.getElementById('motor-display').innerText = info[2] || "-";
        document.getElementById('rating-display').innerText = info[3] || "0.0";
        document.getElementById('user-img').src = `https://ui-avatars.com/api/?name=${info[1]}&background=EE4D2D&color=fff&size=100`;
        document.getElementById('page-form').classList.add('hidden');
        document.getElementById('ui-header').classList.add('hidden');
        document.getElementById('page-dash').classList.remove('hidden');
    }

    function updateGps() {
        handle.style.background = "#2ecc71";
        label.innerText = "MENYINKRONKAN...";
        navigator.geolocation.getCurrentPosition(pos => {
            const pay = { 
                type: "ABSEN", 
                wa: document.getElementById('wa').value, 
                pass: (currentMode === 'LOGIN' ? document.getElementById('pass').value : document.getElementById('pass_daftar').value), 
                lat: pos.coords.latitude, 
                lng: pos.coords.longitude 
            };
            fetch(API_URL, { method: "POST", body: JSON.stringify(pay) }).then(() => { 
                document.getElementById('badge-aktif').style.display = 'block';
                label.innerText = "GPS TERKUNCI ✓";
                setTimeout(() => { handle.style.left = '5px'; handle.style.background = "#EE4D2D"; label.innerText = "GESER UNTUK UPDATE GPS"; }, 2000);
            });
        }, () => { alert("Gagal GPS!"); handle.style.left = '5px'; });
    }
</script>
</body>
</html>
